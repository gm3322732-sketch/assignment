<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact.html">
</head>
<style>
     body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

.contact-container {
    width: 350px;
    margin: 80px auto;
    background: burlywood;
    padding: 25px;
    border-radius: 30px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.contact-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

form input,
form textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
}

form button {
    width: 100%;
    padding: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

form button:hover {
    background: #333;

}
    </style>
</style>
<body>
    <div class="contact-container">
    <h2>Contact Us</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        
        <input type="email" placeholder="Your Email" required>
        
        <textarea placeholder="Your Message" rows="5" required></textarea>
        
        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
